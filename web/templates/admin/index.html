<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a', 300: '#fcd34d',
                      400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309',
                      800: '#92400e', 900: '#78350f' }
          }
        }
      }
    }
  </script>
  <title>dy · Admin</title>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-[100dvh] transition-colors duration-200">

  <div class="max-w-4xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-2xl font-bold text-brand-600 dark:text-brand-400">Admin Dashboard</h1>
      <button id="themeToggle" class="p-2 rounded-lg bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 shadow-sm text-zinc-500 dark:text-zinc-400">
        <svg id="sunIcon" class="w-5 h-5 hidden dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg id="moonIcon" class="w-5 h-5 block dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>

    <div class="bg-white dark:bg-zinc-900 rounded-xl border border-zinc-200 dark:border-zinc-800 p-6 mb-6">
      <h2 class="text-sm font-medium text-zinc-500 dark:text-zinc-400 uppercase tracking-wide mb-4">User Info</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
        <div><span class="text-zinc-500 dark:text-zinc-400">Name</span><p class="font-medium">{{ user.name }} {{ user.surname }}</p></div>
        <div><span class="text-zinc-500 dark:text-zinc-400">Role</span><p class="font-medium"><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-brand-100 dark:bg-brand-900 text-brand-700 dark:text-brand-300">{{ user.role.value }}</span></p></div>
        <div><span class="text-zinc-500 dark:text-zinc-400">Department</span><p class="font-medium">{{ user.department.value }}</p></div>
        <div><span class="text-zinc-500 dark:text-zinc-400">Telegram ID</span><p class="font-medium font-mono text-xs">{{ user.telegram_id }}</p></div>
        <div><span class="text-zinc-500 dark:text-zinc-400">Email</span><p class="font-medium">{{ user.email or '—' }}</p></div>
        <div><span class="text-zinc-500 dark:text-zinc-400">Quarter</span><p class="font-medium">{{ user.quarter or '—' }}</p></div>
      </div>
    </div>

    <div class="bg-white dark:bg-zinc-900 rounded-xl border border-zinc-200 dark:border-zinc-800 p-6">
      <h2 class="text-sm font-medium text-zinc-500 dark:text-zinc-400 uppercase tracking-wide mb-4">Dashboard</h2>
      <p class="text-zinc-400 dark:text-zinc-600 text-sm">Dashboard content coming soon.</p>
    </div>
  </div>

  <script>
    (function() {
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (prefersDark) document.documentElement.classList.add('dark');
      document.getElementById('themeToggle').addEventListener('click', function() {
        document.documentElement.classList.toggle('dark');
      });
    })();
  </script>
</body>
</html>
