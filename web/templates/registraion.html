<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a', 300: '#fcd34d',
                      400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309',
                      800: '#92400e', 900: '#78350f' }
          }
        }
      }
    }
  </script>
  <title>Create Account</title>
  <style>
    .dark-toggle { position: fixed; top: 12px; right: 12px; z-index: 50; }
  </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-[100dvh] transition-colors duration-200">

  <button id="themeToggle" class="dark-toggle p-2 rounded-lg bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 shadow-sm text-zinc-500 dark:text-zinc-400">
    <svg id="sunIcon" class="w-5 h-5 hidden dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <svg id="moonIcon" class="w-5 h-5 block dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <div class="max-w-md mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-brand-600 dark:text-brand-400">Create Account</h1>
    <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1 mb-6">Fill in your details to register. A registration code is required.</p>

    <form id="registerForm" class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <label class="block">
          <span class="text-xs font-medium text-zinc-600 dark:text-zinc-400">Name</span>
          <input name="name" required class="mt-1 w-full px-3 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
        </label>
        <label class="block">
          <span class="text-xs font-medium text-zinc-600 dark:text-zinc-400">Surname</span>
          <input name="surname" required class="mt-1 w-full px-3 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
        </label>
      </div>

      <label class="block">
        <span class="text-xs font-medium text-zinc-600 dark:text-zinc-400">Phone (+237)</span>
        <input name="phone" type="tel" placeholder="+237XXXXXXXXX" required class="mt-1 w-full px-3 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
      </label>

      <label class="block">
        <span class="text-xs font-medium text-zinc-600 dark:text-zinc-400">Email</span>
        <input name="email" type="email" placeholder="you@example.com" class="mt-1 w-full px-3 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
      </label>

      <div class="grid grid-cols-2 gap-3">
        <label class="block">
          <span class="text-xs font-medium text-zinc-600 dark:text-zinc-400">Gender</span>
          <select name="gender" required class="mt-1 w-full px-3 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
            <option value="">--</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </label>
        <label class="block">
          <span class="text-xs font-medium text-zinc-600 dark:text-zinc-400">Group</span>
          <select name="group" class="mt-1 w-full px-3 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
            <option value="">None</option>
            <option value="A">A</option>
            <option value="B">B</option>
          </select>
        </label>
      </div>

      <label class="block">
        <span class="text-xs font-medium text-zinc-600 dark:text-zinc-400">Department</span>
        <select name="department" required class="mt-1 w-full px-3 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
          <option value="">--</option>
          <option value="ISM">ISM</option>
          <option value="SWE">SWE</option>
          <option value="CGWD">CGWD</option>
          <option value="EDM">EDM</option>
          <option value="CSN">CSN</option>
          <option value="DBMS">DBMS</option>
          <option value="NWS">NWS</option>
        </select>
      </label>

      <label class="block">
        <span class="text-xs font-medium text-zinc-600 dark:text-zinc-400">School</span>
        <input name="school" required class="mt-1 w-full px-3 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
      </label>

      <div class="grid grid-cols-2 gap-3">
        <label class="block">
          <span class="text-xs font-medium text-zinc-600 dark:text-zinc-400">Date of Birth</span>
          <input name="dob" type="date" required class="mt-1 w-full px-3 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
        </label>
        <label class="block">
          <span class="text-xs font-medium text-zinc-600 dark:text-zinc-400">Quarter</span>
          <input name="quarter" type="number" min="1" max="12" placeholder="e.g. Simbock" class="mt-1 w-full px-3 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
        </label>
      </div>

      <label class="block">
        <span class="text-xs font-medium text-zinc-600 dark:text-zinc-400">Registration Code</span>
        <input name="code" placeholder="6-digit code" required class="mt-1 w-full px-3 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
      </label>

      <p id="errorMsg" class="text-sm text-red-600 dark:text-red-400 hidden"></p>

      <button type="submit" id="submitBtn" class="w-full py-2.5 rounded-lg bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-semibold text-sm transition-colors disabled:opacity-50">
        Register
      </button>
    </form>
  </div>

  <script>
  (function() {
    var tg = null;
    try { tg = window.Telegram?.WebApp; if (tg) tg.ready(); } catch(e) {}

    var tid = null;
    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
      tid = String(tg.initDataUnsafe.user.id);
    }
    if (!tid) {
      tid = new URLSearchParams(window.location.search).get('telegram_id');
    }

    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (prefersDark) document.documentElement.classList.add('dark');

    document.getElementById('themeToggle').addEventListener('click', function() {
      document.documentElement.classList.toggle('dark');
    });

    var form = document.getElementById('registerForm');
    var err = document.getElementById('errorMsg');
    var btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      err.classList.add('hidden');
      if (!tid) {
        err.textContent = 'Telegram ID not available — open this page from Telegram';
        err.classList.remove('hidden');
        return;
      }
      var data = {
        name: form.elements['name'].value,
        surname: form.elements['surname'].value,
        phone: form.elements['phone'].value,
        telegram_id: tid,
        gender: form.elements['gender'].value,
        department: form.elements['department'].value,
        group: form.elements['group'].value || null,
        school: form.elements['school'].value,
        dob: form.elements['dob'].value,
        email: form.elements['email'].value || null,
        quarter: form.elements['quarter'].value ? parseInt(form.elements['quarter'].value) : null,
        code: form.elements['code'].value,
      };
      btn.disabled = true;
      btn.textContent = 'Registering...';
      try {
        var res = await (await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        })).json();
        if (res.ok) {
          window.location.href = res.redirect;
        } else {
          err.textContent = res.detail;
          err.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Register';
        }
      } catch(e) {
        err.textContent = 'Network error';
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Register';
      }
    });
  })();
  </script>
</body>
</html>
