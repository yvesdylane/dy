<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a', 300: '#fcd34d',
                      400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309',
                      800: '#92400e', 900: '#78350f' }
          }
        }
      }
    }
  </script>
  <title>dy</title>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-[100dvh] transition-colors duration-200">

<div id="loadingView" class="flex items-center justify-center min-h-[90dvh]">
  <div class="animate-spin h-8 w-8 border-4 border-brand-500 border-t-transparent rounded-full"></div>
</div>

<!--SECTION:register-->
<div id="adminView" class="hidden flex min-h-screen">
  <div class="hidden md:flex md:flex-col md:w-56 md:bg-zinc-50 md:dark:bg-zinc-900 md:border-r md:border-zinc-200 md:dark:border-zinc-800 md:fixed md:h-full">
    <div class="p-4 border-b border-zinc-200 dark:border-zinc-800">
      <h2 class="font-bold text-brand-600 dark:text-brand-400">dy</h2>
      <p id="adminNameSide" class="text-xs text-zinc-500 mt-1"></p>
    </div>
    <nav class="flex-1 p-2 space-y-1">
      <button data-section="stats" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-brand-100 dark:hover:bg-brand-950 flex items-center gap-2.5 transition-colors">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="10" width="4" height="11" rx="1"/><rect x="10" y="6" width="4" height="15" rx="1"/><rect x="17" y="2" width="4" height="19" rx="1"/></svg>
        <span>Stats</span>
      </button>
      <button data-section="people" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-brand-100 dark:hover:bg-brand-950 flex items-center gap-2.5 transition-colors">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>People</span>
      </button>
      <button data-section="attendance" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-brand-100 dark:hover:bg-brand-950 flex items-center gap-2.5 transition-colors">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></svg>
        <span>Attendance</span>
      </button>
      <button data-section="tasks" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-brand-100 dark:hover:bg-brand-950 flex items-center gap-2.5 transition-colors">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Tasks</span>
      </button>
      <button data-section="notes" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-brand-100 dark:hover:bg-brand-950 flex items-center gap-2.5 transition-colors">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Notes</span>
      </button>
      <button data-section="bulletin" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-brand-100 dark:hover:bg-brand-950 flex items-center gap-2.5 transition-colors">
        <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span>Bulletin</span>
      </button>
    </nav>
  </div>
  <div class="flex-1 md:ml-56 min-w-0">
    <div class="md:hidden flex flex-wrap items-center gap-2 p-4 border-b border-zinc-200 dark:border-zinc-800">
      <div class="flex items-center gap-2 min-w-0 flex-1">
        <div class="w-8 h-8 rounded-lg bg-brand-500 flex items-center justify-center text-white font-bold text-sm shrink-0">D</div>
        <div class="min-w-0">
          <h1 id="headerTitle" class="font-bold text-sm truncate">Dashboard</h1>
          <p id="adminNameMobile" class="text-xs text-zinc-500 truncate"></p>
        </div>
      </div>
      <div id="headerPills" class="hidden shrink-0"></div>
    </div>
    <div class="p-4 pb-24 md:pb-4">
      <!--SECTION:stats-->
      <!--SECTION:people-->
      <!--SECTION:attendance-->
      <!--SECTION:tasks-->
      <!--SECTION:notes-->
      <!--SECTION:bulletin-->
    </div>
  </div>
  <div id="modalOverlay" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
    <div id="modalContent" class="bg-white dark:bg-zinc-900 rounded-xl w-full max-w-md max-h-[85vh] overflow-y-auto p-5 space-y-4"></div>
  </div>
  <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-zinc-950 border-t border-zinc-200 dark:border-zinc-800 flex safe-area-bottom">
    <button data-section="stats" class="nav-btn flex-1 py-2 text-center text-xs font-medium flex flex-col items-center gap-0.5">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="10" width="4" height="11" rx="1"/><rect x="10" y="6" width="4" height="15" rx="1"/><rect x="17" y="2" width="4" height="19" rx="1"/></svg>
      <span>Stats</span>
    </button>
    <button data-section="people" class="nav-btn flex-1 py-2 text-center text-xs font-medium flex flex-col items-center gap-0.5">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>People</span>
    </button>
    <button data-section="attendance" class="nav-btn flex-1 py-2 text-center text-xs font-medium flex flex-col items-center gap-0.5">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></svg>
      <span>Attd</span>
    </button>
    <button data-section="tasks" class="nav-btn flex-1 py-2 text-center text-xs font-medium flex flex-col items-center gap-0.5">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>Tasks</span>
    </button>
    <button data-section="notes" class="nav-btn flex-1 py-2 text-center text-xs font-medium flex flex-col items-center gap-0.5">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Notes</span>
    </button>
    <button data-section="bulletin" class="nav-btn flex-1 py-2 text-center text-xs font-medium flex flex-col items-center gap-0.5">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <span>Bulletin</span>
    </button>
  </div>
</div>

<div id="welcomeView" class="hidden max-w-md mx-auto p-4 text-center space-y-4">
  <div class="text-5xl mt-16 mb-4">👋</div>
  <h2 class="text-xl font-bold" id="welcomeName"></h2>
  <p class="text-sm text-zinc-500 dark:text-zinc-400">You're registered. Use bot commands like /info to view your data.</p>
</div>

<script>
(function() {
  console.log('dy: init started');
  let tid = null;
  let tg = null;

  try {
    tg = window.Telegram?.WebApp || null;
    if (tg) tg.ready();

    const params = new URLSearchParams(window.location.search);
    const urlTid = params.get('telegram_id');
    if (urlTid) { tid = urlTid; console.log('dy: tid from URL', tid); }

    if (!tid && tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
      tid = String(tg.initDataUnsafe.user.id);
      console.log('dy: tid from tg', tid);
    }
    console.log('dy: tid final', tid);
  } catch(e) { console.error('dy: setup error', e); }

  const cs = tg ? tg.colorScheme : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.classList.toggle('dark', cs === 'dark');

  const show = (id) => {
    ['loadingView','registerView','adminView','welcomeView'].forEach(v => {
      const el = document.getElementById(v);
      if (!el) return;
      if (v === id) {
        el.style.display = '';
        el.classList.remove('hidden');
      } else {
        el.style.display = 'none';
      }
    });
  };

  const nameEl = (id) => document.getElementById(id);
  const esc = (s) => { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; };

  function showSection(name) {
    const allSections = ['sectionStats','sectionPeople','sectionAttendance','sectionTasks','sectionNotes','sectionBulletin'];
    allSections.forEach(s =>
      nameEl(s).classList.toggle('hidden', s !== 'section' + name[0].toUpperCase() + name.slice(1)));
    document.querySelectorAll('.nav-btn').forEach(b => {
      const isActive = b.dataset.section === name;
      b.classList.toggle('bg-brand-100', isActive);
      b.classList.toggle('dark:bg-brand-950/50', isActive);
      b.classList.toggle('text-brand-700', isActive);
      b.classList.toggle('dark:text-brand-300', isActive);
      b.classList.toggle('font-semibold', isActive);
    });
    updateHeader(name);
  }

  function updateHeader(section) {
    const title = nameEl('headerTitle');
    const pills = nameEl('headerPills');
    if (section === 'people') {
      const tab = currentPeopleTab || 'users';
      title.textContent = 'People';
      pills.innerHTML = '<div class="flex gap-1 p-0.5 rounded-lg bg-zinc-100 dark:bg-zinc-800 w-fit">' +
        '<button class="people-tab px-3 py-1 text-xs font-medium rounded-md transition-colors ' +
          (tab === 'users' ? 'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 shadow-sm' : 'text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-zinc-100') +
        '" data-people-tab="users">Users</button>' +
        '<button class="people-tab px-3 py-1 text-xs font-medium rounded-md transition-colors ' +
          (tab === 'codes' ? 'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 shadow-sm' : 'text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-zinc-100') +
        '" data-people-tab="codes">Codes</button>' +
        '</div>';
      pills.classList.remove('hidden');
    } else if (section === 'bulletin') {
      const tab = currentBulletinTab || 'info';
      title.textContent = 'Bulletin';
      pills.innerHTML = '<div class="flex gap-1 p-0.5 rounded-lg bg-zinc-100 dark:bg-zinc-800 w-fit">' +
        '<button class="bulletin-tab px-3 py-1 text-xs font-medium rounded-md transition-colors ' +
          (tab === 'info' ? 'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 shadow-sm' : 'text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-zinc-100') +
        '" data-bulletin-tab="info">Announcements</button>' +
        '<button class="bulletin-tab px-3 py-1 text-xs font-medium rounded-md transition-colors ' +
          (tab === 'complaints' ? 'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 shadow-sm' : 'text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-zinc-100') +
        '" data-bulletin-tab="complaints">Complaints</button>' +
        '</div>';
      pills.classList.remove('hidden');
    } else if (section === 'attendance') {
      const tab = currentAttTab || 'registers';
      title.textContent = 'Attendance';
      pills.innerHTML = '<div class="flex gap-1 p-0.5 rounded-lg bg-zinc-100 dark:bg-zinc-800 w-fit">' +
        '<button class="att-tab px-3 py-1 text-xs font-medium rounded-md transition-colors ' +
          (tab === 'registers' ? 'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 shadow-sm' : 'text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-zinc-100') +
        '" data-att-tab="registers">Registers</button>' +
        '<button class="att-tab px-3 py-1 text-xs font-medium rounded-md transition-colors ' +
          (tab === 'leaves' ? 'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 shadow-sm' : 'text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-zinc-100') +
        '" data-att-tab="leaves">Leaves</button>' +
        '<button class="att-tab px-3 py-1 text-xs font-medium rounded-md transition-colors ' +
          (tab === 'pass' ? 'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 shadow-sm' : 'text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-zinc-100') +
        '" data-att-tab="pass">Pass</button>' +
        '</div>';
      pills.classList.remove('hidden');
    } else if (section === 'tasks') {
      const tab = currentTasksTab || 'tasks';
      title.textContent = 'Tasks';
      pills.innerHTML = '<div class="flex gap-1 p-0.5 rounded-lg bg-zinc-100 dark:bg-zinc-800 w-fit">' +
        '<button class="tasks-tab px-3 py-1 text-xs font-medium rounded-md transition-colors ' +
          (tab === 'tasks' ? 'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 shadow-sm' : 'text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-zinc-100') +
        '" data-tasks-tab="tasks">Tasks</button>' +
        '<button class="tasks-tab px-3 py-1 text-xs font-medium rounded-md transition-colors ' +
          (tab === 'cleaning' ? 'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 shadow-sm' : 'text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-zinc-100') +
        '" data-tasks-tab="cleaning">Cleaning</button>' +
        '</div>';
      pills.classList.remove('hidden');
    } else {
      const names = {stats:'Dashboard',notes:'Notes'};
      title.textContent = names[section] || section.charAt(0).toUpperCase() + section.slice(1);
      pills.classList.add('hidden');
    }
  }

  let currentPeopleTab = 'users';
  function switchPeopleTab(tab) {
    currentPeopleTab = tab;
    nameEl('sectionUsers').classList.toggle('hidden', tab !== 'users');
    nameEl('sectionCodes').classList.toggle('hidden', tab !== 'codes');
    if (tab === 'users') loadUsers();
    if (tab === 'codes') loadCodes();
    updateHeader('people');
  }

  let currentBulletinTab = 'info';
  function switchBulletinTab(tab) {
    currentBulletinTab = tab;
    nameEl('sectionInfo').classList.toggle('hidden', tab !== 'info');
    nameEl('sectionComplaints').classList.toggle('hidden', tab !== 'complaints');
    if (tab === 'info') loadInfo();
    if (tab === 'complaints') loadComplaints();
    updateHeader('bulletin');
  }

  let currentAttTab = 'registers';
  function switchAttTab(tab) {
    currentAttTab = tab;
    nameEl('sectionRegisters').classList.toggle('hidden', tab !== 'registers');
    nameEl('sectionLeaves').classList.toggle('hidden', tab !== 'leaves');
    nameEl('passView').classList.toggle('hidden', tab !== 'pass');
    if (tab === 'leaves') loadLeaves();
    if (tab === 'pass') loadPass();
    updateHeader('attendance');
  }

  let currentTasksTab = 'tasks';
  function switchTasksTab(tab) {
    currentTasksTab = tab;
    nameEl('sectionTasksInner').classList.toggle('hidden', tab !== 'tasks');
    nameEl('sectionCleaning').classList.toggle('hidden', tab !== 'cleaning');
    if (tab === 'tasks') loadTasks();
    if (tab === 'cleaning') loadCleaning();
    updateHeader('tasks');
  }

  async function loadComplaints() {
    const r = await (await fetch('/api/admin/complaints?telegram_id=' + encodeURIComponent(tid))).json();
    if (!r.ok) return;
    const list = nameEl('complaintsList');
    list.innerHTML = r.complaints.map(c => {
      const icon = c.type === 'complaint' ? '💢' : '💡';
      return '<div class="p-3 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900">' +
        '<div class="flex items-center gap-2 mb-1">' +
        '<span>' + icon + '</span>' +
        '<span class="text-xs font-medium px-2 py-0.5 rounded-full ' + (c.type === 'complaint' ? 'bg-red-50 dark:bg-red-950 text-red-600 dark:text-red-400' : 'bg-blue-50 dark:bg-blue-950 text-blue-600 dark:text-blue-400') + '">' + c.type + '</span>' +
        '<span class="text-xs text-zinc-400">' + c.department + (c.group ? ' · Group ' + c.group : '') + '</span>' +
        '</div>' +
        '<p class="text-sm whitespace-pre-wrap">' + esc(c.content) + '</p>' +
        '<p class="text-xs text-zinc-400 mt-1">' + c.created_at + '</p>' +
        '</div>';
    }).join('');
  }

  async function loadStats() {
    const s = await (await fetch('/api/admin/stats?telegram_id=' + encodeURIComponent(tid))).json();
    if (s.ok) {
      nameEl('statUsers').textContent = s.total_users;
      nameEl('statInterns').textContent = s.interns;
      nameEl('statInstructors').textContent = s.instructors;
      nameEl('statTasks').textContent = s.tasks;
      nameEl('statTotalFees').textContent = Number(s.total_fees).toLocaleString();
      nameEl('statPaid').textContent = Number(s.total_paid).toLocaleString() + ' / ' + Number(s.total_fees).toLocaleString();
    }
  }

  let allUsers = [];
  let userPage = 1;
  const userPerPage = 20;

  function filterUsers() {
    const q = nameEl('userSearch').value.toLowerCase();
    const dept = nameEl('userDeptFilter').value;
    const role = nameEl('userRoleFilter').value;
    return allUsers.filter(u =>
      (u.name.toLowerCase().includes(q) || u.surname.toLowerCase().includes(q) || u.phone.includes(q)) &&
      (!dept || u.department === dept) &&
      (!role || u.role === role)
    );
  }

  function renderUsers() {
    const list = nameEl('usersList');
    const filtered = filterUsers();
    const total = filtered.length;
    const totalPages = Math.ceil(total / userPerPage) || 1;
    if (userPage > totalPages) userPage = totalPages;
    const start = (userPage - 1) * userPerPage;
    const pageUsers = filtered.slice(start, start + userPerPage);
    const countEl = nameEl('userCount');
    if (countEl) countEl.textContent = total + ' user' + (total !== 1 ? 's' : '');
    const pagEl = nameEl('userPagination');
    if (pagEl) {
      let html = '';
      if (totalPages > 1) {
        html += '<button class="px-2 py-1 rounded ' + (userPage <= 1 ? 'text-zinc-400' : 'text-brand-500 hover:bg-brand-50 dark:hover:bg-brand-950 cursor-pointer') + '" data-page="' + (userPage - 1) + '"' + (userPage <= 1 ? ' disabled' : '') + '>\u2039</button>';
        html += '<span class="px-2 py-1 text-zinc-500">' + userPage + '/' + totalPages + '</span>';
        html += '<button class="px-2 py-1 rounded ' + (userPage >= totalPages ? 'text-zinc-400' : 'text-brand-500 hover:bg-brand-50 dark:hover:bg-brand-950 cursor-pointer') + '" data-page="' + (userPage + 1) + '"' + (userPage >= totalPages ? ' disabled' : '') + '>\u203a</button>';
      }
      pagEl.innerHTML = html;
    }
    list.innerHTML = pageUsers.map(u => {
      return '<div class="user-row p-3 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 flex items-center justify-between cursor-pointer hover:bg-zinc-50 dark:hover:bg-zinc-850 transition-colors" data-id="' + u.id + '">' +
        '<div class="min-w-0 flex-1">' +
        '<p class="font-medium text-sm truncate">' + u.name + ' ' + u.surname + '</p>' +
        '<p class="text-xs text-zinc-500">' + u.department + ' \u00b7 ' + u.role + ' \u00b7 ' + u.phone + ' \u00b7 ' + (u.linked ? 'linked' : 'pending') + ' \u00b7 <span class="font-mono">' + u.telegram_id + '</span></p>' +
        '</div>' +
        '<span class="text-xs px-2 py-0.5 rounded-full ' + (u.role === 'admin' ? 'bg-brand-100 dark:bg-brand-900 text-brand-700 dark:text-brand-300' : u.role === 'instructor' ? 'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300' : 'bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300') + '">' + u.role + '</span>' +
        '</div>';
    }).join('');
  }

  async function loadUsers() {
    const group = nameEl('userGroupFilter').value;
    let url = '/api/admin/users?per_page=200&telegram_id=' + encodeURIComponent(tid);
    if (group) url += '&group=' + encodeURIComponent(group);
    const r = await (await fetch(url)).json();
    if (!r.ok) return;
    allUsers = r.users;
    userPage = 1;
    renderUsers();
  }

  async function loadCodes() {
    const r = await (await fetch('/api/admin/codes?telegram_id=' + encodeURIComponent(tid))).json();
    if (!r.ok) return;
    const list = nameEl('codesList');
    list.innerHTML = r.codes.map(c => `
      <div class="code-row flex items-center gap-2 p-3 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900">
        <input type="checkbox" class="code-checkbox shrink-0 accent-brand-500" data-id="${c.id}">
        <div class="flex-1 min-w-0">
          <p class="font-mono text-sm">${c.code}</p>
          <p class="text-xs text-zinc-500">${c.is_used ? 'Used' : 'Available'} · ${c.role}</p>
        </div>
        <button class="del-code-btn p-1.5 text-red-500 hover:bg-red-50 dark:hover:bg-red-950 rounded-lg text-xs" data-id="${c.id}">✕</button>
      </div>
    `).join('');
    updateDeleteSelectedBtn();
  }

  function updateDeleteSelectedBtn() {
    const checked = document.querySelectorAll('.code-checkbox:checked');
    const btn = nameEl('deleteSelectedCodesBtn');
    const count = nameEl('selectedCount');
    if (checked.length) {
      btn.classList.remove('hidden');
      count.classList.remove('hidden');
      count.textContent = checked.length + ' selected';
    } else {
      btn.classList.add('hidden');
      count.classList.add('hidden');
    }
  }

  async function checkAndShow(idToCheck) {
    try {
      console.log('dy: fetching /api/me for', idToCheck);
      const resp = await fetch('/api/me?telegram_id=' + encodeURIComponent(idToCheck));
      console.log('dy: /api/me status', resp.status);
      const me = await resp.json();
      console.log('dy: /api/me response', JSON.stringify(me));
      if (!me.exists) { console.log('dy: → registerView (user_not_exists)'); show('registerView'); return; }
      if (me.role === 'admin') {
        const fullName = me.name + ' ' + me.surname;
        nameEl('adminNameSide').textContent = fullName;
        nameEl('adminNameMobile').textContent = fullName;
        show('adminView');
        try { await loadStats(); } catch(e) { console.error('Stats load failed', e); }
        const reloadBtn = nameEl('reloadBtn');
        if (reloadBtn) reloadBtn.addEventListener('click', async () => {
          reloadBtn.textContent = 'Reloading...';
          try { await loadStats(); } catch(e) {}
          reloadBtn.textContent = 'Reload';
        });
        const saveDbBtn = nameEl('saveDbBtn');
        if (saveDbBtn) saveDbBtn.addEventListener('click', async () => {
          saveDbBtn.textContent = 'Saving...';
          try {
            const r = await (await fetch('/api/admin/save-db?telegram_id=' + encodeURIComponent(tid), { method: 'POST' })).json();
            saveDbBtn.textContent = r.ok ? 'Sent!' : r.detail;
            setTimeout(() => { saveDbBtn.textContent = 'Save DB'; }, 3000);
          } catch(e) {
            saveDbBtn.textContent = 'Error';
            setTimeout(() => { saveDbBtn.textContent = 'Save DB'; }, 3000);
          }
        });
        showSection('stats');

        document.querySelectorAll('.nav-btn').forEach(b =>
          b.addEventListener('click', async () => {
            const section = b.dataset.section;
            showSection(section);
            if (section === 'users') await loadUsers();
            if (section === 'codes') await loadCodes();
            if (section === 'people') { await switchPeopleTab('users'); }
            if (section === 'attendance') { switchAttTab(currentAttTab); if (currentAttTab === 'registers' && nameEl('attDate').value) await loadAttendance(nameEl('attDate').value); }
            if (section === 'tasks') { switchTasksTab(currentTasksTab); }
            if (section === 'notes') await loadNotes();
            if (section === 'info') await loadInfo();
            if (section === 'complaints') await loadComplaints();
            if (section === 'bulletin') { await switchBulletinTab('info'); }
          })
        );

        nameEl('addUserBtn')?.addEventListener('click', () => showUserForm());
        nameEl('addCodeBtn')?.addEventListener('click', () => showCodeForm());

        document.addEventListener('click', (e) => {
          const tab = e.target.closest('.people-tab');
          if (tab) switchPeopleTab(tab.dataset.peopleTab);
        });

        document.addEventListener('click', (e) => {
          const tab = e.target.closest('.bulletin-tab');
          if (tab) switchBulletinTab(tab.dataset.bulletinTab);
        });

        document.addEventListener('click', (e) => {
          const tab = e.target.closest('.att-tab');
          if (tab) switchAttTab(tab.dataset.attTab);
        });

        document.addEventListener('click', (e) => {
          const tab = e.target.closest('.tasks-tab');
          if (tab) switchTasksTab(tab.dataset.tasksTab);
        });

        nameEl('exportComplaintsBtn')?.addEventListener('click', () => {
          window.open('/api/admin/complaints?telegram_id=' + encodeURIComponent(tid) + '&format=csv', '_blank');
        });

        nameEl('userSearch')?.addEventListener('input', renderUsers);
        nameEl('userDeptFilter')?.addEventListener('change', renderUsers);
        nameEl('userRoleFilter')?.addEventListener('change', renderUsers);
        nameEl('userGroupFilter')?.addEventListener('change', () => { userPage = 1; loadUsers(); });

        nameEl('usersList')?.addEventListener('click', (e) => {
          const row = e.target.closest('.user-row');
          if (row) {
            const u = allUsers.find(x => x.id == row.dataset.id);
            if (u) showUserDetail(u);
          }
        });
        nameEl('userPagination')?.addEventListener('click', (e) => {
          const btn = e.target.closest('[data-page]');
          if (btn && !btn.disabled) {
            userPage = parseInt(btn.dataset.page);
            renderUsers();
          }
        });

        document.addEventListener('click', async (e) => {
          const d = e.target.closest('.del-code-btn');
          if (d && confirm('Delete this code?')) {
            await fetch('/api/admin/codes/' + d.dataset.id + '?telegram_id=' + encodeURIComponent(tid), {method:'DELETE'});
            await loadCodes();
          }
        });

        nameEl('selectAllCodes')?.addEventListener('change', (e) => {
          document.querySelectorAll('.code-checkbox').forEach(cb => cb.checked = e.target.checked);
          updateDeleteSelectedBtn();
        });

        document.addEventListener('change', (e) => {
          if (e.target.classList.contains('code-checkbox')) updateDeleteSelectedBtn();
        });

        nameEl('deleteSelectedCodesBtn')?.addEventListener('click', async () => {
          const checked = document.querySelectorAll('.code-checkbox:checked');
          const ids = Array.from(checked).map(cb => parseInt(cb.dataset.id));
          if (!ids.length || !confirm('Delete ' + ids.length + ' selected code' + (ids.length > 1 ? 's' : '') + '?')) return;
          nameEl('deleteSelectedCodesBtn').textContent = 'Deleting...';
          await fetch('/api/admin/codes/delete-batch?telegram_id=' + encodeURIComponent(tid),
            {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ids})});
          nameEl('deleteSelectedCodesBtn').textContent = 'Delete Selected';
          await loadCodes();
        });

        nameEl('deleteAllCodesBtn')?.addEventListener('click', async () => {
          if (!confirm('Delete ALL codes? This cannot be undone.')) return;
          nameEl('deleteAllCodesBtn').textContent = 'Deleting...';
          await fetch('/api/admin/codes/delete-batch?telegram_id=' + encodeURIComponent(tid),
            {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({all: true})});
          nameEl('deleteAllCodesBtn').textContent = 'Delete All';
          await loadCodes();
        });
      } else {
        nameEl('welcomeName').textContent = 'Welcome back, ' + me.name + '!';
        show('welcomeView');
      }
    } catch(e) {
      console.log('dy: → registerView (checkAndShow_error)', e);
      show('registerView');
    }
  }

          </div>`;

        const roleBtn = nameEl('confirmRoleBtn');
        const roleErr = nameEl('confirmRoleErr');
        const doSave = async () => {
          roleBtn.disabled = true; roleBtn.textContent = 'Saving...';
          const r = await (await fetch('/api/admin/users/' + data.id + '?telegram_id=' + encodeURIComponent(tid), {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)})).json();

          else { roleErr.textContent = r.detail; roleErr.classList.remove('hidden'); roleBtn.disabled = false; roleBtn.textContent = 'Change Role'; }
        };

          const match = roleInput.value.trim() === fullName;
          roleBtn.disabled = !match;
          roleBtn.className = match
            ? 'flex-1 py-2.5 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium'

      else { const err = nameEl('userFormErr'); err.textContent = r.detail; err.classList.remove('hidden'); btn.disabled = false; btn.textContent = isEdit ? 'Save' : 'Create'; }

  async function loadAttendance(dateStr) {
    const r = await (await fetch('/api/admin/attendance?telegram_id=' + encodeURIComponent(tid) + '&date_str=' + encodeURIComponent(dateStr))).json();
    if (!r.ok) return;
    const badge = nameEl('attGroupBadge');
    const students = nameEl('attStudents');
    const actions = nameEl('attActions');
    const saveBtn = nameEl('attSaveBtn');
    const createBtn = nameEl('attCreateBtn');
    const deleteBtn = nameEl('attDeleteBtn');
    badge.classList.remove('hidden');
    badge.textContent = 'Group ' + r.group;
    if (r.exists) {
      window._attId = r.attendance_id;
      students.classList.remove('hidden');
      students.innerHTML = r.students.map(s => '<div class="flex items-center gap-2 p-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900" data-user-id="' + s.user_id + '">' +
        '<span class="flex-1 text-sm font-medium truncate">' + esc(s.name) + ' ' + esc(s.surname) + '</span>' +
        '<input type="time" class="enter-time px-2 py-1 rounded border border-zinc-300 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-900 text-xs outline-none focus:ring-1 focus:ring-brand-500" value="' + (s.enter_at || '') + '">' +
        '<input type="time" class="exit-time px-2 py-1 rounded border border-zinc-300 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-900 text-xs outline-none focus:ring-1 focus:ring-brand-500" value="' + (s.left_at || '') + '">' +
        '</div>').join('');
      actions.classList.remove('hidden');

  async function loadPass() {
    const r = await (await fetch('/api/admin/codes/active?telegram_id=' + encodeURIComponent(tid))).json();
    if (!r.ok) return;
    const grid = nameEl('passGrid');
    const status = nameEl('passStatus');
    grid.innerHTML = '';
    const codes = r.codes || [];
    const now = Date.now();
    codes.forEach(c => {
      const remaining = Math.max(0, Math.floor((new Date(c.expires_at).getTime() - now) / 1000));
      const cell = document.createElement('div');
      cell.className = 'flex items-center justify-center p-2 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900';
      cell.innerHTML = '<code class="text-sm font-mono font-bold tracking-wider text-brand-600 dark:text-brand-400">' + c.code + '</code>' +
        '<span class="text-[10px] text-zinc-400 ml-2">' + remaining + 's</span>';
      grid.appendChild(cell);
    });
    status.textContent = codes.length + '/16 active';
    grid.classList.toggle('hidden', codes.length === 0);
    nameEl('passStartBtn').classList.toggle('hidden', codes.length > 0);
    nameEl('passStopBtn').classList.toggle('hidden', codes.length === 0);
  }

      const f = e.target;
      const g = (n) => f.elements[n];
      const body = { role: g('role').value, expiry_minutes: parseInt(g('expiry').value) || 60, count: parseInt(g('count').value) || 1 };
      const r = await (await fetch('/api/admin/codes?telegram_id=' + encodeURIComponent(tid),
        {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)})).json();
      btn.disabled = false; btn.textContent = 'Generate';
      if (r.ok) { m.classList.add('hidden'); await loadCodes(); }
      else { const err = nameEl('codeFormErr'); err.textContent = r.detail || 'Error'; err.classList.remove('hidden'); }
    });
  }

  // --- Info / Announcements ---
  let allInfo = [];
  async function loadInfo() {
    const r = await (await fetch('/api/admin/info?telegram_id=' + encodeURIComponent(tid))).json();
    if (!r.ok) return;
    allInfo = r.info;
    renderInfo();
  }
  function renderInfo() {
    const list = nameEl('infoList');
    list.innerHTML = allInfo.map(item => {
      const preview = item.content ? item.content.substring(0, 100) + (item.content.length > 100 ? '…' : '') : '';
      const date = item.created_at ? new Date(item.created_at).toLocaleDateString() : '';
      return '<div class="info-row p-3 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 cursor-pointer hover:bg-zinc-50 dark:hover:bg-zinc-850 transition-colors" data-id="' + item.id + '">' +
        '<div class="flex items-center justify-between"><p class="font-medium text-sm truncate">' + esc(item.title) + '</p>' +
        '<span class="text-xs text-zinc-400 shrink-0 ml-2">' + date + '</span></div>' +
        '<p class="text-xs text-zinc-500 mt-1 truncate">' + esc(preview) + '</p></div>';
    }).join('');
  }
  function showInfoDetail(item) {
    const m = nameEl('modalOverlay');
    const c = nameEl('modalContent');
    const dl = item.file_id ? '<a href="/api/files/' + item.file_id + '" target="_blank" class="inline-flex items-center gap-1 text-brand-600 dark:text-brand-400 text-sm font-medium">📎 Download File</a>' : item.file_url ? '<a href="' + esc(item.file_url) + '" target="_blank" class="inline-flex items-center gap-1 text-brand-600 dark:text-brand-400 text-sm font-medium">📎 Download File</a>' : '';
    c.innerHTML = '<h3 class="font-bold text-lg break-words">' + esc(item.title) + '</h3>' +
      '<p class="text-sm whitespace-pre-wrap">' + esc(item.content || '') + '</p>' +
      '<p class="text-xs text-zinc-400">' + new Date(item.created_at).toLocaleString() + '</p>' +
      (dl ? '<div>' + dl + '</div>' : '') +
      '<div class="flex gap-2 pt-2">' +
      '<button type="button" id="modalEditInfo" class="flex-1 py-2.5 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium">Edit</button>' +
      '<button type="button" id="modalDeleteInfo" class="flex-1 py-2.5 rounded-lg border border-red-300 dark:border-red-800 text-red-600 dark:text-red-400 text-sm font-medium">Delete</button>' +
      '<button type="button" id="modalClose" class="flex-1 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 text-sm font-medium">Close</button></div>';
    m.classList.remove('hidden');
    nameEl('modalClose').onclick = () => m.classList.add('hidden');
    nameEl('modalEditInfo').onclick = () => { m.classList.add('hidden'); showInfoForm(item); };
    nameEl('modalDeleteInfo').onclick = async () => {
      if (!confirm("Delete announcement \"" + esc(item.title) + "\"?")) return;
      await fetch('/api/admin/info/' + item.id + '?telegram_id=' + encodeURIComponent(tid), {method:'DELETE'});
      m.classList.add('hidden');
      await loadInfo();
    };
    m.onclick = (e) => { if (e.target === m) m.classList.add('hidden'); };
  }
  function showInfoForm(data) {
    const m = nameEl('modalOverlay');
    const c = nameEl('modalContent');
    const isEdit = !!data;
    c.innerHTML = '<h3 class="font-bold text-lg">' + (isEdit ? 'Edit' : 'Add') + ' Announcement</h3>' +
      '<form id="infoForm" class="space-y-3" onsubmit="return false">' +
      '<input name="title" placeholder="Title" value="' + (isEdit ? esc(data.title) : '') + '" required' +
      ' class="w-full px-3 py-2 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-900 text-sm outline-none focus:ring-2 focus:ring-brand-500">' +
      '<textarea name="content" placeholder="Content" rows="5" required' +
      ' class="w-full px-3 py-2 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-900 text-sm outline-none focus:ring-2 focus:ring-brand-500">' + (isEdit ? esc(data.content || '') : '') + '</textarea>' +
      '<label class="block text-sm font-medium text-zinc-600 dark:text-zinc-400">File (optional)' +
      '<input type="file" name="file" class="mt-1 w-full text-sm file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-brand-50 dark:file:bg-brand-950 file:text-brand-700 dark:file:text-brand-300 hover:file:bg-brand-100 dark:hover:file:bg-brand-900 cursor-pointer"></label>' +
      '<p id="infoFormErr" class="text-red-500 text-xs hidden"></p>' +
      '<div class="flex gap-2"><button type="button" id="modalCancel" class="flex-1 py-2.5 rounded-lg border border-zinc-300 dark:border-zinc-700 text-sm font-medium">Cancel</button>' +
      '<button type="submit" id="infoSubmitBtn" class="flex-1 py-2.5 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium">' + (isEdit ? 'Save' : 'Create') + '</button></div></form>';
    m.classList.remove('hidden');
    nameEl('modalCancel').onclick = () => m.classList.add('hidden');
    m.onclick = (e) => { if (e.target === m) m.classList.add('hidden'); };
    nameEl('infoForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = nameEl('infoSubmitBtn');
      if (btn.disabled) return;
      btn.disabled = true; btn.textContent = 'Saving...';
      const f = e.target;
      const fd = new FormData();
      fd.append('title', f.elements['title'].value);
      fd.append('content', f.elements['content'].value);
      if (f.elements['file'].files[0]) fd.append('file', f.elements['file'].files[0]);
      const url = isEdit ? '/api/admin/info/' + data.id + '?telegram_id=' + encodeURIComponent(tid) : '/api/admin/info?telegram_id=' + encodeURIComponent(tid);
      const method = isEdit ? 'PUT' : 'POST';
      const r = await (await fetch(url, {method, body: fd})).json();
      if (r.ok) { m.classList.add('hidden'); await loadInfo(); btn.disabled = false; btn.textContent = isEdit ? 'Save' : 'Create'; }
      else { const err = nameEl('infoFormErr'); err.textContent = r.detail; err.classList.remove('hidden'); btn.disabled = false; btn.textContent = isEdit ? 'Save' : 'Create'; }
    });
  }
  nameEl('addInfoBtn').addEventListener('click', () => showInfoForm());
  nameEl('infoList').addEventListener('click', (e) => {
    const row = e.target.closest('.info-row');
    if (row) { const item = allInfo.find(x => x.id == row.dataset.id); if (item) showInfoDetail(item); }
  });

  try {
    const attDate = nameEl('attDate');
    if (attDate) attDate.valueAsDate = new Date();
  } catch(e) { console.error('dy: attDate error', e); }

  (async () => {
    try {
      if (tid) { await checkAndShow(tid); return; }
      console.log('dy: → registerView (no_tid)');
      show('registerView');
    } catch(e) { console.error('dy: init error', e); console.log('dy: → registerView (init_error)'); show('registerView'); }
  })();

  const form = document.getElementById('registerForm');
  if (form) {
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      if (!form.name) {
        err.textContent = 'Full registration form coming soon. Use /link in the bot for now.';
        err.style.display = 'block';
        return;
      }
      if (!tid) { err.textContent = 'Telegram ID not available — open this page from Telegram'; err.style.display = 'block'; return; }
      const data = {
        name: form.name.value, surname: form.surname.value, phone: form.phone.value,
        telegram_id: tid, gender: form.gender.value, department: form.department.value,
        group: form.group.value || null, school: form.school.value, dob: form.dob.value,
        code: form.code ? form.code.value : '',
      };
      try {
        const res = await (await fetch('/api/register', { method:'POST',
          headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) })).json();
        if (res.ok) {
          var qd = sessionStorage.getItem('qrD');
          var qs = sessionStorage.getItem('qrS');
          sessionStorage.removeItem('qrD');
          sessionStorage.removeItem('qrS');
          if (qd && qs) {
            window.location.href = '/mark?d=' + encodeURIComponent(qd) + '&s=' + encodeURIComponent(qs);
          } else {
            if (tg) { tg.HapticFeedback?.notificationOccurred?.('success'); tg.close(); }
            else location.reload();
          }
        } else {
          err.textContent = res.detail; err.style.display = 'block';
        }
      } catch(e) {
        err.textContent = 'Network error'; err.style.display = 'block';
      }
      return false;
    });
  }
})();
</script>
</body>
</html>
