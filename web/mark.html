<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Mark Attendance</title>
  <style>
    body {
      margin: 0; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff; color: #111; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #09090b; color: #f4f4f5; }
    }
    .spinner {
      width: 32px; height: 32px; border: 4px solid #f59e0b; border-top-color: transparent;
      border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { font-size: 16px; font-weight: 500; }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div id="status">Processing...</div>
  <script>
  (async function() {
    let tg = null;
    try { tg = window.Telegram?.WebApp; if (tg) tg.ready(); } catch(e) {}

    const p = new URLSearchParams(window.location.search);
    const d = p.get('d');
    const s = p.get('s');

    if (!d || !s) {
      document.getElementById('status').textContent = 'Invalid QR code';
      document.querySelector('.spinner').remove();
      setTimeout(() => { if (tg) tg.close(); }, 2000);
      return;
    }

    try {
      const headers = {};
      if (tg && tg.initData) headers['X-Init-Data'] = tg.initData;
      const res = await fetch('/api/mark?d=' + encodeURIComponent(d) + '&s=' + encodeURIComponent(s), { headers });
      const data = await res.json();

      document.querySelector('.spinner').remove();

      if (data.needs_register) {
        sessionStorage.setItem('qrD', d);
        sessionStorage.setItem('qrS', s);
        document.getElementById('status').textContent = 'Create an account first...';
        const url = '/app/register?telegram_id=' + encodeURIComponent(data.telegram_id);
        window.location.href = url;
        return;
      }

      if (data.ok) {
        document.getElementById('status').className = 'success';
        document.getElementById('status').textContent = data.message;
        if (tg) tg.HapticFeedback?.notificationOccurred?.('success');
        setTimeout(() => { if (tg) tg.close(); }, 1500);
      } else {
        document.getElementById('status').className = 'error';
        document.getElementById('status').textContent = data.message;
        setTimeout(() => { if (tg) tg.close(); }, 3000);
      }
    } catch(e) {
      document.querySelector('.spinner').remove();
      document.getElementById('status').className = 'error';
      document.getElementById('status').textContent = 'Network error';
      setTimeout(() => { if (tg) tg.close(); }, 3000);
    }
  })();
  </script>
</body>
</html>
