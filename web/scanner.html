<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Attendance Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #09090b; color: #f4f4f5; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .card {
      background: #18181b; border-radius: 16px; padding: 32px 24px;
      width: 100%; max-width: 340px; box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }
    .icon { width: 64px; height: 64px; margin: 0 auto 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .icon-entry { background: #14532d; color: #22c55e; }
    .icon-exit { background: #1c1917; color: #f59e0b; }
    .action-label { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .action-sub { font-size: 14px; color: #a1a1aa; margin-bottom: 24px; }
    .scan-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: #f59e0b; color: #09090b; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }
    .scan-btn:disabled { opacity: .5; cursor: default; }
    .scan-btn:hover:not(:disabled) { opacity: .9; }
    .result { margin-top: 16px; padding: 12px; border-radius: 10px; font-size: 14px; display: none; }
    .result-success { background: #14532d; color: #22c55e; display: block; }
    .result-error { background: #450a0a; color: #ef4444; display: block; }
    .result-info { background: #1c1917; color: #f59e0b; display: block; }
    .close-btn {
      margin-top: 12px; width: 100%; padding: 12px; border: 1px solid #27272a;
      border-radius: 12px; background: transparent; color: #a1a1aa;
      font-size: 14px; cursor: pointer; display: none;
    }
    .close-btn:hover { background: #27272a; }
    .spinner {
      width: 20px; height: 20px; border: 2px solid #09090b; border-top-color: transparent;
      border-radius: 50%; animation: spin .5s linear infinite; display: none;
    }
    .scan-btn.loading .spinner { display: inline-block; }
    .scan-btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon icon-entry" id="actionIcon">✓</div>
    <div class="action-label" id="actionLabel">Mark Entry</div>
    <div class="action-sub" id="actionSub">Scan the QR code to record your attendance</div>

    <button class="scan-btn" id="scanBtn" onclick="startScan()">
      <span class="btn-text">Scan QR</span>
      <div class="spinner"></div>
    </button>

    <div class="result" id="result"></div>

    <button class="close-btn" id="closeBtn" onclick="closeApp()">Done</button>
  </div>

  <script>
    var tg = null;
    try { tg = window.Telegram?.WebApp; if (tg) tg.ready(); } catch (e) {}

    var currentStatus = null; // 'entry' or 'exit'

    function closeApp() {
      try { if (tg) tg.close(); } catch(e) {}
    }

    function setResult(msg, type) {
      var el = document.getElementById('result');
      el.textContent = msg;
      el.className = 'result result-' + type;
      if (type === 'success' || type === 'error') {
        document.getElementById('closeBtn').style.display = 'block';
      }
    }

    function startScan() {
      var btn = document.getElementById('scanBtn');
      if (btn.disabled) return;
      btn.disabled = true;
      btn.classList.add('loading');

      if (tg && tg.showScanQrPopup) {
        tg.showScanQrPopup(
          { text: 'Point at the attendance QR code' },
          function(scannedText) {
            try {
              var match = scannedText.match(/[?&]startapp=([^&]+)/);
              if (!match) {
                setResult('Invalid QR code: no start parameter found', 'error');
                return false;
              }
              var sp = decodeURIComponent(match[1]);
              if (sp.length < 2 || sp[0] !== 'M') {
                setResult('Invalid QR code format', 'error');
                return false;
              }
              var c = sp.slice(1).replace(/-/g, '+').replace(/_/g, '/');
              var decoded = atob(c);
              var sep = decoded.indexOf('|');
              if (sep < 1) {
                setResult('Invalid QR code payload', 'error');
                return false;
              }
              var d = decoded.slice(0, sep);
              var s = decoded.slice(sep + 1);
              markAttendance(d, s);
              return true;
            } catch(e) {
              setResult('Error reading QR: ' + e.message, 'error');
              return false;
            }
          }
        );
      } else {
        setResult('QR scanner is not available on this device. Use your phone camera to scan instead.', 'info');
        document.getElementById('closeBtn').style.display = 'block';
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    async function markAttendance(d, s) {
      setResult('Marking attendance...', 'info');

      try {
        var headers = {};
        if (tg && tg.initData) headers['X-Init-Data'] = tg.initData;

        var res = await fetch('/api/mark?d=' + encodeURIComponent(d) + '&s=' + encodeURIComponent(s), { headers });
        var data = await res.json();

        if (data.needs_register) {
          setResult('Create an account first...', 'info');
          sessionStorage.setItem('qrD', d);
          sessionStorage.setItem('qrS', s);
          window.location.href = '/app/register?telegram_id=' + encodeURIComponent(data.telegram_id);
          return;
        }

        if (data.ok) {
          setResult(data.message, 'success');
        } else {
          setResult(data.message || 'Failed to mark attendance', 'error');
        }
      } catch(e) {
        setResult('Network error: ' + e.message, 'error');
      }

      document.getElementById('scanBtn').disabled = false;
      document.getElementById('scanBtn').classList.remove('loading');
    }

    // Fetch today's status on load
    (async function() {
      try {
        if (tg && tg.initData) {
          var res = await fetch('/api/me', { headers: { 'X-Init-Data': tg.initData } });
          var data = await res.json();
          if (data.exists && data.role === 'intern') {
            currentStatus = data.today_status || 'entry';
            if (currentStatus === 'exit') {
              document.getElementById('actionIcon').className = 'icon icon-exit';
              document.getElementById('actionIcon').textContent = '→';
              document.getElementById('actionLabel').textContent = 'Mark Exit';
              document.getElementById('actionSub').textContent = 'Scan the QR code to record your exit';
            }
          }
        }
      } catch(e) {}
    })();
  </script>
</body>
</html>
