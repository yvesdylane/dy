<div id="codesView" class="flex flex-col items-center gap-4 py-4">
  <div class="flex items-center gap-3">
    <button id="codesStartBtn" class="px-6 py-2.5 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium">Start</button>
    <button id="codesStopBtn" class="px-6 py-2.5 rounded-lg bg-red-500 hover:bg-red-600 text-white text-sm font-medium hidden">Stop</button>
  </div>
  <p id="codesStatus" class="text-xs text-zinc-500"></p>
  <div id="codesGrid" class="hidden grid grid-cols-2 gap-2 w-full max-w-md" style="grid-template-rows: repeat(8, auto);"></div>
</div>
