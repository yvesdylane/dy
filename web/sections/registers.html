<div id="sectionRegisters" class="space-y-4">
  <div class="flex items-center gap-2">
    <input id="attDate" type="date" class="flex-1 px-3 py-1.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 text-sm outline-none focus:ring-2 focus:ring-brand-500">
    <button id="attLoadBtn" class="px-4 py-1.5 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium">Load</button>
  </div>
  <div id="attGroupBadge" class="hidden text-xs font-medium px-2 py-1 rounded-full bg-brand-100 dark:bg-brand-900 text-brand-700 dark:text-brand-300 inline-block"></div>
  <div id="attStudents" class="space-y-2"></div>
  <div id="attActions" class="hidden flex gap-2">
    <button id="attSaveBtn" class="flex-1 py-2 rounded-lg bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium">Save</button>
    <button id="attCreateBtn" class="flex-1 py-2 rounded-lg bg-green-500 hover:bg-green-600 text-white text-sm font-medium">Create</button>
    <button id="attDeleteBtn" class="flex-1 py-2 rounded-lg border border-red-300 dark:border-red-800 text-red-600 dark:text-red-400 text-sm font-medium">Delete</button>
  </div>
</div>
