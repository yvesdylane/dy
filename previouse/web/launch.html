<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script async src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #09090b; display: flex; align-items: center; justify-content: center; min-height: 100dvh; }
    .spinner { width: 24px; height: 24px; border: 3px solid #f59e0b; border-top-color: transparent; border-radius: 50%; animation: spin .5s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <script>
    try {
      var _hash = window.location.hash;
      var _sp = new URLSearchParams(window.location.hash.replace(/^#/, '')).get('tgWebAppStartParam') || new URLSearchParams(window.location.search).get('tgWebAppStartParam');
      if (_sp && _sp.length > 1 && _sp[0] === 'M') {
        var _c = _sp.slice(1).replace(/-/g, '+').replace(/_/g, '/');
        var _decoded = atob(_c);
        var _sep = _decoded.indexOf('|');
        if (_sep > 0) {
          window.location.href = '/mark?d=' + encodeURIComponent(_decoded.slice(0, _sep)) + '&s=' + encodeURIComponent(_decoded.slice(_sep + 1)) + _hash;
          return;
        }
      }

      var _tg = window.Telegram?.WebApp;
      var _tid = null;
      if (_tg && _tg.initDataUnsafe && _tg.initDataUnsafe.user) {
        _tid = String(_tg.initDataUnsafe.user.id);
      }
      if (!_tid) {
        _tid = new URLSearchParams(window.location.search).get('telegram_id');
      }

      if (_tg && _tg.initData) { try { sessionStorage.setItem('tg_init_data', _tg.initData); } catch(e) {} }
      function _nav(u){window.location.href=u+_hash;}

      if (_tid && _tg && _tg.initData) {
        (async function() {
          try {
            var _res = await fetch('/api/me', { headers: { 'X-Init-Data': _tg.initData } });
            var _data = await _res.json();
            if (_data.exists && _data.role === 'intern') {
              _nav('/scanner');
            } else if (_data.exists) {
              _nav('/app?telegram_id=' + encodeURIComponent(_tid));
            } else {
              _nav('/app/register?telegram_id=' + encodeURIComponent(_tid));
            }
          } catch(e) {
            _nav('/app?telegram_id=' + encodeURIComponent(_tid));
          }
        })();
      } else if (_tid) {
        _nav('/app/register?telegram_id=' + encodeURIComponent(_tid));
      } else {
        _nav('/app');
      }
    } catch(e) {
      window.location.href = '/app';
    }
  </script>
</body>
</html>
